        showToast("직원 상세 조회 실패", error.message || String(error), "error");
      }
    }

    function closeAdminEmployeeDetail() {
      const modal = $("adminEmployeeDetail");
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    function renderSyncRows(rows) {
      if (!rows.length) {
        $("syncRows").innerHTML = `<div class="row"><div class="time">0</div><div><strong>신규 감지 없음</strong><span>직원 사번 명단과 근태현황 시트가 동기화되어 있습니다.</span></div><span class="tag green">완료</span></div>`;
        return;
      }

      $("syncRows").innerHTML = rows.slice(0, 4).map((row) => `
        <div class="row"><div class="time">${escapeHtml((row.name || "?").slice(0, 1))}</div><div><strong>${escapeHtml(row.name)}</strong><span>${escapeHtml(row.department || "-")} · ${escapeHtml(row.employeeId)} · ${escapeHtml(row.status)}</span></div><span class="tag amber">대기</span></div>
      `).join("");
    }

    function renderAttentionRows(rows) {
      $("attentionCount").textContent = rows.length + "건";
      $("attentionCount").className = "tag " + (rows.length ? "amber" : "green");

      if (!rows.length) {
        $("attentionRows").innerHTML = `<div class="row"><div class="time">OK</div><div><strong>확인 필요 항목 없음</strong><span>명단, 출근, 퇴근 상태가 안정적으로 처리되고 있습니다.</span></div><span class="tag green">정상</span></div>`;
        return;
      }

      $("attentionRows").innerHTML = rows.slice(0, 5).map((row) => `
        <div class="row"><div class="time">${escapeHtml(row.badge || "!")}</div><div><strong>${escapeHtml(row.title)}</strong><span>${escapeHtml(row.detail || "")}</span></div><span class="tag amber">${escapeHtml(row.status || "확인")}</span></div>
      `).join("");
    }

    function renderPasswordResetRows(rows) {
      $("passwordResetCount").textContent = rows.length + "건";
      $("passwordResetCount").className = "tag " + (rows.length ? "amber" : "green");

      if (!rows.length) {
        $("passwordResetRows").innerHTML = `<div class="row"><div class="time">OK</div><div><strong>초기화 요청 없음</strong><span>대기 중인 비밀번호 초기화 요청이 없습니다.</span></div><span class="tag green">정상</span></div>`;
        return;
      }

      $("passwordResetRows").innerHTML = rows.map((row) => `
        <div class="row">
          <div class="time">PW</div>
          <div><strong>${escapeHtml(row.name || "-")}</strong><span>${escapeHtml(row.department || "-")} · ${escapeHtml(row.employeeId || "-")} · ${escapeHtml(row.requestedAt || "")}</span></div>
          <button class="btn reset-password" type="button" data-employee-id="${escapeHtml(row.employeeId || "")}">초기화</button>
        </div>
      `).join("");

      document.querySelectorAll(".reset-password").forEach((button) => {
        button.addEventListener("click", () => resetPassword(button));
      });
    }

    function getAdminFilters() {
      return {};
    }

    async function refreshAdmin(button) {
      setBusy(button, true);
      try {
        const payload = await callServer("getAdminDashboard", getAdminFilters());
        applyAdminPayload(payload);
        if (button) showToast("관리자 데이터 갱신", "오늘 근태현황을 다시 불러왔습니다.");
      } catch (error) {
        showToast("관리자 조회 실패", error.message || String(error), "error");
      } finally {
        setBusy(button, false);
      }
    }

    async function enterAdminMode() {
      if (state.role !== "admin") {
        showToast("관리자 권한 필요", "관리자 계정에서만 사용할 수 있습니다.", "error");
        return;
      }

      state.adminMode = true;
      syncNavigation();
      setView("admin");
      if (!state.admin) await refreshAdmin(null);
    }

    async function saveEmployeeStatus(button) {
      const employeeId = button.dataset.employeeId;
      const select = Array.from(document.querySelectorAll(".status-input"))
        .find((input) => input.dataset.employeeId === employeeId);
      setBusy(button, true);
      try {
        const response = await callServer("updateEmployeeStatus", { employeeId, status: select.value });
        showToast("재직상태 저장", response.name + "님의 상태가 " + response.status + "으로 저장되었습니다.");
        await refreshAdmin(null);
      } catch (error) {
        showToast("상태 저장 실패", error.message || String(error), "error");
      } finally {
        setBusy(button, false);
      }
    }

    function upsertLocalAttendanceRow(payload, today) {
      const rows = Array.isArray(payload.rows) ? payload.rows.slice() : [];
      const parsedDate = parseAttendanceDate(today.date);
      let row = rows.find((item) => item.date === today.date);

      if (!row) {
        row = {
          date: today.date,
          day: parsedDate ? parsedDate.getDate() : "",
          clockIn: "",
          clockOut: "",
          early: "",
          overtime: "",
          ot: "",
          leaveUsed: "",
          workTime: "0:00"
        };
        rows.push(row);
      }

      row.clockIn = today.clockIn || "";
      row.clockOut = today.clockOut || "";
      row.workTime = getDisplayWorkTime(today);
      payload.rows = rows.sort((left, right) => Number(left.day || 0) - Number(right.day || 0));
    }

    function applyLocalAttendanceResponse(response) {
      const payload = state.employee || {
        employee: state.user,
        today: {},
        rows: [],
        summary: {},
        gps: { verified: true, distanceM: VERIFIED_GPS_DISTANCE_M, allowedRadiusM: 200 }
      };
      const today = Object.assign({}, payload.today || {});
      const targetKey = response.type === "clockOut" ? "clockOut" : "clockIn";

      payload.employee = payload.employee || state.user;
      today.date = response.date || today.date || formatSheetDate(new Date());
      today[targetKey] = response.savedTime || today[targetKey] || "";

      if (today.clockIn && today.clockOut) {
        today.workTime = formatDurationMinutes(computeWorkMinutes(today.clockIn, parseTimeToMinutes(today.clockOut)));
      } else {
        today.workTime = getDisplayWorkTime(today);
      }

      payload.today = today;
      upsertLocalAttendanceRow(payload, today);
      applyEmployeePayload(payload);
      updateCachedEmployee(payload);
    }

    function queueEmployeeRefresh() {
      window.clearTimeout(state.refreshTimer);
      state.refreshTimer = window.setTimeout(() => refreshEmployeeInBackground(), 1400);
    }

    async function submitAttendance(type, button) {
      if (!state.user) {
        showToast("로그인이 필요합니다", "직원 계정으로 로그인해 주세요.", "error");
        setView("login");
        return;
      }

      if (state.attendanceSaving) return;

      state.attendanceSaving = true;
      setAttendanceBusy(true, type);
      try {
        const response = await callServer("registerAttendance", {
          employeeId: state.user.employeeId,
          type,
          gpsDistanceM: VERIFIED_GPS_DISTANCE_M,
          device: DEFAULT_DEVICE_NAME
        });
        applyLocalAttendanceResponse(response);
        showToast(type === "clockIn" ? "출근 등록 완료" : "퇴근 등록 완료", response.savedTime + "으로 등록되었습니다.");
        queueEmployeeRefresh();
      } catch (error) {
        showToast(type === "clockIn" ? "출근 등록 실패" : "퇴근 등록 실패", error.message || String(error), "error");
      } finally {
        state.attendanceSaving = false;
        setAttendanceBusy(false, type);
      }
    }

    async function login() {
      const button = $("loginBtn");
      const employeeId = $("loginEmployeeId").value.trim();
      if (state.loginSaving) return;
      if (!/^\d{7}$/.test(employeeId)) {
        showToast("사번 확인", "7자리 사번을 입력해 주세요.", "error");
        return;
      }

      state.loginSaving = true;
      setBusy(button, true, '<span class="mini-loader" aria-hidden="true"></span><span>로그인 중...</span>');
      try {
        const response = await callServer("login", {
          employeeId
        });
        state.user = response.user;
        state.role = response.role;
        state.adminMode = false;
        syncNavigation();
        applyEmployeePayload(response.employee);
        writeSession(response);
        document.body.classList.add("login-complete");
        setView("employee");
        window.setTimeout(() => document.body.classList.remove("login-complete"), 350);
        showToast("로그인 완료", response.user.name + "님의 근태 정보를 불러왔습니다.");
      } catch (error) {
        showToast("로그인 실패", error.message || String(error), "error");
      } finally {
        state.loginSaving = false;
        setBusy(button, false);
      }
    }

    async function changePasswordFromForm(prefix, button) {
      const currentPassword = $(prefix + "CurrentPassword").value.trim();
      const newPassword = $(prefix + "NewPassword").value.trim();
      const confirmPassword = $(prefix + "NewPasswordConfirm").value.trim();

      if (!state.user) {
        showToast("로그인이 필요합니다", "다시 로그인해 주세요.", "error");
        setView("login");
        return;
      }

      if (newPassword !== confirmPassword) {
        showToast("비밀번호 확인", "새 비밀번호와 확인값이 일치하지 않습니다.", "error");
        return;
      }

      if (newPassword.length < 4 || !isValidNewPassword(newPassword)) {
        showToast("비밀번호 형식", "새 비밀번호는 4자리 이상, 영문과 숫자를 모두 포함해 주세요.", "error");
        return;
      }

      setBusy(button, true);
      try {
        const response = await callServer("changePassword", {
          employeeId: state.user.employeeId,
          currentPassword,
          newPassword
        });
        state.user = response.user;
        state.role = response.role;
        syncNavigation();
        applyEmployeePayload(response.employee);
        if (response.role === "admin" && response.admin) {
          applyAdminPayload(response.admin);
        }
        setView("employee");
        showToast("비밀번호 변경 완료", "새 비밀번호로 로그인 상태를 유지합니다.");
      } catch (error) {
        showToast("비밀번호 변경 실패", error.message || String(error), "error");
      } finally {
        setBusy(button, false);
      }
    }

    async function forgotPassword() {
      const employeeId = $("loginEmployeeId").value.trim();

      if (!employeeId) {
        showToast("사번 입력 필요", "초기화를 요청할 사번을 먼저 입력해 주세요.", "error");
        return;
      }

      const button = $("forgotPasswordBtn");
      setBusy(button, true);
      try {
        await callServer("requestPasswordReset", { employeeId });
        showToast("요청 완료", "관리자에게 비밀번호 초기화 요청을 보냈습니다.");
      } catch (error) {
        showToast("요청 실패", error.message || String(error), "error");
      } finally {
        setBusy(button, false);
      }
    }

    async function resetPassword(button) {
      const employeeId = button.dataset.employeeId;
      setBusy(button, true);
      try {
        const response = await callServer("resetEmployeePassword", {
          adminEmployeeId: state.user.employeeId,
          employeeId
        });
        showToast("비밀번호 초기화 완료", response.name + "님의 비밀번호를 사번으로 초기화했습니다.");
        await refreshAdmin(null);
      } catch (error) {
        showToast("초기화 실패", error.message || String(error), "error");
      } finally {
        setBusy(button, false);
      }
    }

    async function syncRoster(button) {
      setBusy(button, true);
      try {
        const response = await callServer("syncRosterToAttendanceSheet", {});
        showToast("명단 동기화 완료", response.addedCount + "명의 컬럼을 확인했습니다.");
        await refreshAdmin(null);
      } catch (error) {
        showToast("동기화 실패", error.message || String(error), "error");
      } finally {
        setBusy(button, false);
      }
    }

    function exportEarlyRows() {
      const rows = state.admin?.rows || [];
      const lines = [["직원", "사번", "조출", "출근", "퇴근"].join(",")];
      rows.filter((row) => row.early).forEach((row) => {
        lines.push([row.name, row.employeeId, row.early, row.clockIn, row.clockOut].map(csvCell).join(","));
      });
      const blob = new Blob(["\ufeff" + lines.join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "logiflow-early-report.csv";
      link.click();
      URL.revokeObjectURL(url);
      showToast("내려받기 준비 완료", "현재 검색 결과 기준 조출 내역 CSV를 생성했습니다.");
    }

    async function refreshEmployeeInBackground() {
      if (!state.user || state.loadingFreshData) return;
      state.loadingFreshData = true;
      try {
        const payload = await callServer("getEmployeeDashboard", state.user.employeeId);
        applyEmployeePayload(payload);
        updateCachedEmployee(payload);
      } catch (error) {
        showToast("최신 정보 확인 실패", "저장된 정보로 먼저 표시했습니다.", "error");
      } finally {
        state.loadingFreshData = false;
      }
    }

    function bootstrap() {
      syncHomeLogo();
      startClockTimer();
      const session = readSession();
      if (session?.user?.employeeId) {
        primeSession(session);
        refreshEmployeeInBackground();
        return;
      }

      syncNavigation();
      setView("login");
    }

    function csvCell(value) {
      return '"' + String(value || "").replace(/"/g, '""') + '"';
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    navButtons.forEach((button) => button.addEventListener("click", () => setView(button.dataset.view)));
    viewButtons.forEach((button) => button.addEventListener("click", () => setView(button.dataset.openView)));
    document.querySelectorAll("[data-toggle-password]").forEach((button) => {
      button.addEventListener("click", () => togglePasswordVisibility(button));
    });
    calendarViewButtons.forEach((button) => {
      button.addEventListener("click", () => {
        calendarViewButtons.forEach((item) => item.classList.toggle("active", item === button));
        calendarPanels.forEach((panel) => panel.classList.toggle("active", panel.dataset.calendarPanel === button.dataset.calendarView));
      });
    });
    $("historyPrevMonth").addEventListener("click", () => moveHistoryMonth(-1));
    $("historyNextMonth").addEventListener("click", () => moveHistoryMonth(1));
    $("historyTodayMonth").addEventListener("click", moveHistoryToToday);
    $("attendanceAllOpen").addEventListener("click", openAttendanceAllView);
    $("attendanceAllBack").addEventListener("click", closeAttendanceAllView);
    $("attendanceAllPrevMonth").addEventListener("click", () => moveHistoryMonth(-1));
    $("attendanceAllNextMonth").addEventListener("click", () => moveHistoryMonth(1));
    $("statsPrevMonth").addEventListener("click", () => moveStatsMonth(-1));
    $("statsNextMonth").addEventListener("click", () => moveStatsMonth(1));
    $("statsTodayMonth").addEventListener("click", moveStatsToToday);
    $("attendanceDetailClose").addEventListener("click", closeAttendanceDetail);
    $("attendanceDetailModal").addEventListener("click", (event) => {
      if (event.target === event.currentTarget) closeAttendanceDetail();
    });
    $("attendanceEditRequestBtn").addEventListener("click", () => {
      showToast("근태 수정 요청", "선택한 날짜의 수정 요청은 관리자에게 문의해 주세요.");
    });
    $("adminQuickSearch").addEventListener("input", filterAdminRows);
    $("adminDept").addEventListener("change", filterAdminRows);
    $("adminStatus").addEventListener("change", filterAdminRows);
    $("adminAttendanceStatus").addEventListener("change", filterAdminRows);
    $("adminDetailClose").addEventListener("click", closeAdminEmployeeDetail);
    $("adminEmployeeDetail").addEventListener("click", (event) => {
      if (event.target === event.currentTarget) closeAdminEmployeeDetail();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && $("attendanceDetailModal").classList.contains("open")) closeAttendanceDetail();
      if (event.key === "Escape" && $("adminEmployeeDetail").classList.contains("open")) closeAdminEmployeeDetail();
    });
    $("loginBtn").addEventListener("click", login);
    $("loginEmployeeId").addEventListener("keydown", (event) => {
      if (event.key === "Enter") login();
    });
    $("forgotPasswordBtn").addEventListener("click", forgotPassword);
    $("logoutBtn").addEventListener("click", logout);
    $("adminModeBtn").addEventListener("click", enterAdminMode);
    $("firstPasswordBtn").addEventListener("click", () => changePasswordFromForm("first", $("firstPasswordBtn")));
    $("appNotificationToggle").addEventListener("change", (event) => updateNotificationSetting(event.target.checked));
    $("appAutoLoginToggle").addEventListener("change", (event) => updateAutoLoginSetting(event.target.checked));
    $("appLockToggle").addEventListener("change", (event) => updateAppLockSetting(event.target.checked));
    $("privacyPolicyBtn").addEventListener("click", () => showToast("개인정보 처리방침", "개인정보 처리방침은 추후 추가할 예정입니다."));
    $("openSourceBtn").addEventListener("click", () => showToast("오픈소스 라이선스", "오픈소스 라이선스 내용은 추후 추가할 예정입니다."));
    $("clockInBtn").addEventListener("click", () => submitAttendance("clockIn", $("clockInBtn")));
    $("clockOutBtn").addEventListener("click", () => submitAttendance("clockOut", $("clockOutBtn")));
    $("leaveBtn").addEventListener("click", () => showToast("연차 등록 준비", "연차 저장 시트는 다음 단계에서 연결합니다."));
    $("adminRefreshBtn").addEventListener("click", () => refreshAdmin($("adminRefreshBtn")));
    bootstrap();
  </script>
</body>
