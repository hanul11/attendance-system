<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="color-scheme" content="light">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="한울 근태">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>한울 출퇴근 기록</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon-180.png">
  <style>
    :root {
      color-scheme: light;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fa;
      color: #172033;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    [hidden] { display: none !important; }

    body {
      margin: 0;
      min-height: 100svh;
      background: #f7f8fa;
    }

    .launch-shell {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
    }

    .launch-content {
      width: min(100%, 360px);
      text-align: center;
    }

    .brand-mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      display: block;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 800;
    }

    .subtitle {
      margin: 8px 0 0;
      color: #687386;
      font-size: 14px;
      font-weight: 500;
    }

    .status {
      min-height: 22px;
      margin: 28px 0 0;
      color: #687386;
      font-size: 13px;
    }

    .status.is-error { color: #c2413b; }

    .launch-button {
      width: 100%;
      height: 52px;
      margin-top: 18px;
      border: 0;
      border-radius: 16px;
      background: #2563eb;
      color: #fff;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .launch-button:active { transform: scale(.98); }

    .loader {
      width: 24px;
      height: 24px;
      margin: 18px auto 0;
      border: 2px solid #dbe3f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .version {
      margin: 20px 0 0;
      color: #9aa3b2;
      font-size: 11px;
    }

    .app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #f7f8fa;
    }

    .permission-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
      background: rgba(17, 24, 39, .42);
    }

    .permission-dialog {
      width: min(100%, 360px);
      padding: 24px;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(15, 23, 42, .18);
    }

    .permission-dialog h2 { margin: 0; font-size: 20px; line-height: 1.35; }
    .permission-dialog p { margin: 10px 0 22px; color: #687386; font-size: 14px; line-height: 1.6; }
    .permission-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .permission-actions button { height: 50px; border: 0; border-radius: 16px; font: inherit; font-weight: 650; cursor: pointer; }
    .permission-actions .secondary { border: 1px solid #e2e7ef; background: #fff; color: #445066; }
    .permission-actions .primary { background: #2563eb; color: #fff; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      .loader { animation: none; }
    }
  </style>
</head>
<body>
  <main class="launch-shell" id="launchShell">
    <section class="launch-content" aria-live="polite">
      <img class="brand-mark" src="/assets/icons/icon-192.png" alt="">
      <h1>한울 출퇴근 기록</h1>
      <p class="subtitle">스마트 근태관리</p>
      <div class="loader" id="launchLoader" aria-hidden="true"></div>
      <p class="status" id="launchStatus">앱을 준비하고 있습니다.</p>
      <button class="launch-button" id="launchButton" type="button" hidden>근태 앱 열기</button>
      <p class="version" id="appVersion">Version -</p>
    </section>
  </main>
  <iframe class="app-frame" id="logiflowAppFrame" title="LOGIFLOW 근태관리" hidden></iframe>
  <section class="permission-overlay" id="notificationPermissionPrompt" role="dialog" aria-modal="true" aria-labelledby="notificationPermissionTitle" hidden>
    <div class="permission-dialog">
      <h2 id="notificationPermissionTitle">출퇴근 알림을 허용할까요?</h2>
      <p>출근 및 퇴근 등록 시간을 놓치지 않도록 필요한 알림만 보내드립니다.</p>
      <div class="permission-actions">
        <button class="secondary" id="notificationPermissionCancelBtn" type="button">나중에</button>
        <button class="primary" id="notificationPermissionBtn" type="button">알림 허용</button>
      </div>
    </div>
  </section>
  <script src="/config/app-config.js?v=4"></script>
  <script src="/config/firebase-config.js"></script>
  <script src="/js/firebase-bootstrap.js"></script>
  <script src="/js/notification-service.js"></script>
  <script src="/js/app-bootstrap.js"></script>
</body>
</html>
